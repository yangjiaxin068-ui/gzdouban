{% extends "base.html" %}
{% block title %}演员导演{% endblock %}
{% block content %}
<div class="app-page">
    <div class="page-head">
        <div>
            <div class="page-kicker">People</div>
            <h1 class="page-title">演员与导演分析</h1>
            <p class="page-subtitle">统计出现频率较高的导演和演员，观察数据中的核心创作者。</p>
        </div>
    </div>

    <div class="chart-grid">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-video"></i>
                导演作品数量 Top 20
            </div>
            <div class="card-body">
                <div id="directorChart" class="chart-box chart-tall"></div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                <i class="fas fa-users"></i>
                演员参演数量 Top 20
            </div>
            <div class="card-body">
                <div id="actorChart" class="chart-box chart-tall"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scriptcontent %}
<script>
  const directorChart = echarts.init(document.getElementById('directorChart'));
  const actorChart = echarts.init(document.getElementById('actorChart'));

  const peopleBarOption = function (names, values, color, seriesName) {
    return {
      color: [color],
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
      grid: { left: 118, right: 28, top: 32, bottom: 34 },
      xAxis: {
        type: 'value',
        name: '数量',
        splitLine: { lineStyle: { color: '#eef2f7' } },
        axisLabel: { color: '#667085' }
      },
      yAxis: {
        type: 'category',
        data: names,
        axisLabel: { color: '#344054' },
        axisLine: { lineStyle: { color: '#d0d5dd' } }
      },
      series: [{
        name: seriesName,
        type: 'bar',
        data: values,
        barWidth: 14,
        itemStyle: { borderRadius: [0, 8, 8, 0] }
      }]
    };
  };

  directorChart.setOption(peopleBarOption({{ x | tojson }}, {{ y | tojson }}, '#2563eb', '导演作品数量'));
  actorChart.setOption(peopleBarOption({{ x1 | tojson }}, {{ y1 | tojson }}, '#14b8a6', '演员参演数量'));

  window.addEventListener('resize', function () {
    directorChart.resize();
    actorChart.resize();
  });
</script>
{% endblock %}
