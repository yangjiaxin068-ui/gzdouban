{% extends "base.html" %}
{% block title %}地区语言 - 电影数据分析系统{% endblock %}
{% block content %}
<div class="app-page">
    <section class="page-head">
        <div>
            <span class="eyebrow">Region</span>
            <h1 class="page-title">地区与语言分析</h1>
            <p class="page-subtitle">查看电影制片地区和语言使用情况，判断数据来源结构和主要市场分布。</p>
        </div>
    </section>

    <section class="chart-grid">
        <article class="panel-card">
            <div class="panel-title">
                <div>
                    <span class="eyebrow">Country</span>
                    <h2>制片地区分布</h2>
                </div>
                <i class="fas fa-map-marker-alt"></i>
            </div>
            <div id="countryChart" class="chart-box chart-tall"></div>
        </article>

        <article class="panel-card">
            <div class="panel-title">
                <div>
                    <span class="eyebrow">Language</span>
                    <h2>电影语言分布</h2>
                </div>
                <i class="fas fa-language"></i>
            </div>
            <div id="languageChart" class="chart-box chart-tall"></div>
        </article>
    </section>
</div>
{% endblock %}

{% block scriptcontent %}
<script>
  const countryChart = echarts.init(document.getElementById('countryChart'));
  const languageChart = echarts.init(document.getElementById('languageChart'));

  function horizontalBarOption(names, values, seriesName, colors) {
    return {
      color: colors,
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, borderWidth: 0, backgroundColor: 'rgba(20, 24, 33, 0.92)', textStyle: { color: '#fff' } },
      grid: { left: 118, right: 28, top: 32, bottom: 34 },
      xAxis: {
        type: 'value',
        name: '数量',
        splitLine: { lineStyle: { color: '#edf2f7' } },
        axisLabel: { color: '#64748b' }
      },
      yAxis: {
        type: 'category',
        data: names,
        inverse: true,
        axisLabel: { color: '#334155' },
        axisLine: { lineStyle: { color: '#d8dee9' } }
      },
      series: [{
        name: seriesName,
        type: 'bar',
        data: values,
        barWidth: 16,
        itemStyle: {
          borderRadius: [0, 8, 8, 0],
          color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
            { offset: 0, color: colors[0] },
            { offset: 1, color: colors[1] || colors[0] }
          ])
        }
      }]
    };
  }

  countryChart.setOption(horizontalBarOption({{ x | tojson }}, {{ y | tojson }}, '制片地区', ['#2f6fed', '#1aa99a']));
  languageChart.setOption(horizontalBarOption({{ x1 | tojson }}, {{ y1 | tojson }}, '电影语言', ['#f5a524', '#e25563']));

  window.addEventListener('resize', function () {
    countryChart.resize();
    languageChart.resize();
  });
</script>
{% endblock %}
