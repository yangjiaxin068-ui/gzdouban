{% extends "base.html" %}
{% block title %}地址信息{% endblock %}
{% block stylecontent %}
<link href="/static/css/styles.css" rel="stylesheet"/>
{% endblock %}
{% block content %}
<div class="container-fluid px-4">
    <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item"></li>
    </ol>
    <div class="card mb-4">
        <div class="card-header">
            <i class="fas fa-chart-area me-1"></i>
            电影拍摄地点统计图
        </div>
        <div class="card-body">
            <div id="mainOne" style="width: 100%;height: 450px;"></div>
        </div>
    </div>
    <div class="card mb-4 col-lg-12">
        <div class="card-header">
            <i class="fas fa-chart-area me-1"></i>
            电影语言统计图
        </div>
        <div class="card-body">
            <div id="mainTwo" style="width: 100%;height: 450px;"></div>
        </div>
    </div>
</div>
{% endblock %}
{% block scriptcontent %}
<script>
  // 电影拍摄地点统计图
  var chartDom = document.getElementById('mainOne')
  var myChart = echarts.init(chartDom)
  var option
  option = {
    //标题
    title: {
      text: ' 电影拍摄地点统计',
      left: 'center',
      textStyle: {
        color: '#2f7add',
        fontSize: 16,
      },
    },
    //提示框
    tooltip: {
      trigger: 'axis',
      textStyle: {
        color: '#000',
      },
      axisPointer: {
        type: 'cross',
      },
    },
    //图例
    legend: {
      orient: 'vertical',
      left: 'right',
    },
    //横轴信息
    xAxis: {
      type: 'value',
      name: '数量',
    },
    //纵轴信息
    yAxis: {
      type: 'category',
      data: {{ x | safe }},
      name: '地区',
    },
    //缩放
    dataZoom: {
      type: 'inside',
      start: 0,
      orient: 'vertical',
    },
    //系列列表
    series: [
      {
        name: '拍摄地点',
        type: 'bar',
        data:{{ y | safe }},
        showBackground: true,
        backgroundStyle: {
          color: 'rgba(212,192,220,0.5)',
        },
        itemStyle: {
          color: 'rgba(61,227,49,0.8)',
        },
        //设置动画效果
        animationDuration: 5000,
        animationEasing: 'cubicOut',
      }],
  }
  option && myChart.setOption(option)
</script>

<script>
  //电影语言统计图
  var chartDom = document.getElementById('mainTwo')
  var myChart = echarts.init(chartDom)
  var option
  option = {
    //标题
    title: {
      text: '',
      left: 'center',
      textStyle: {
        color: '#2f7add',
        fontSize: 16,
      },
    },
    //提示框
    tooltip: {
      trigger: 'axis',
      textStyle: {
        color: '#000',
      },
      axisPointer: {
        type: 'cross',
      },
    },
    //图例
    legend: {
      orient: 'vertical',
      left: 'right',
    },
    //极坐标配置
    polar: {
      radius: ['20%', '80%'],
    },
    //角度轴（x轴）
    angleAxis: {
      type: 'category',
      data: {{ x1 | safe }},
      startAngle: 180,
      splitNumber:3
    },
    //半径轴（y轴）
    radiusAxis: {
      type: 'value',
      min:20,
      max: 100,
      nameTextStyle:{
        color: '#0f0',
      },
    },
      //缩放
    dataZoom: {
        type: 'inside',
        start: 0,
        orient: 'vertical',
    },
    //系列列表
    series: [
      {
        name: '种类',
        type: 'bar',
        data:{{ y1 | safe }},
        coordinateSystem: 'polar',
        showBackground: true,
        backgroundStyle: {
          color: 'rgba(186,107,218,0.5)',
        },
        itemStyle: {
          color: 'rgba(61,227,49,0.8)',
        },
        //设置动画效果
        animationDuration: 5000,
        animationEasing: 'cubicOut',
      }],
  }
  option && myChart.setOption(option)
</script>

{% endblock %}
