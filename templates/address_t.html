{% extends "base.html" %}
{% block title %}地区语言{% endblock %}
{% block content %}
<div class="app-page">
    <div class="page-head">
        <div>
            <div class="page-kicker">Region</div>
            <h1 class="page-title">地区与语言分析</h1>
            <p class="page-subtitle">查看电影制片地区和语言使用情况，便于判断数据来源构成。</p>
        </div>
    </div>

    <div class="chart-grid">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-map-marker-alt"></i>
                制片地区分布
            </div>
            <div class="card-body">
                <div id="countryChart" class="chart-box chart-tall"></div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                <i class="fas fa-language"></i>
                电影语言分布
            </div>
            <div class="card-body">
                <div id="languageChart" class="chart-box chart-tall"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scriptcontent %}
<script>
  const countryChart = echarts.init(document.getElementById('countryChart'));
  const languageChart = echarts.init(document.getElementById('languageChart'));
  const countryNames = {{ x | tojson }};
  const countryValues = {{ y | tojson }};
  const languageNames = {{ x1 | tojson }};
  const languageValues = {{ y1 | tojson }};

  const horizontalBarOption = function (names, values, seriesName, color) {
    return {
      color: [color],
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
      grid: { left: 110, right: 28, top: 32, bottom: 34 },
      xAxis: {
        type: 'value',
        name: '数量',
        splitLine: { lineStyle: { color: '#eef2f7' } },
        axisLabel: { color: '#667085' }
      },
      yAxis: {
        type: 'category',
        data: names,
        axisLabel: { color: '#344054' },
        axisLine: { lineStyle: { color: '#d0d5dd' } }
      },
      series: [{
        name: seriesName,
        type: 'bar',
        data: values,
        barWidth: 16,
        itemStyle: { borderRadius: [0, 8, 8, 0] }
      }]
    };
  };

  countryChart.setOption(horizontalBarOption(countryNames, countryValues, '制片地区', '#2563eb'));
  languageChart.setOption(horizontalBarOption(languageNames, languageValues, '电影语言', '#14b8a6'));

  window.addEventListener('resize', function () {
    countryChart.resize();
    languageChart.resize();
  });
</script>
{% endblock %}
