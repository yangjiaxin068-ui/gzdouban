<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="referrer" content="no-referrer"/>
    <title>{% block title %}电影数据分析系统{% endblock %}</title>
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet"/>
    {% block stylecontent %}{% endblock %}
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet"/>
</head>
<body class="sb-nav-fixed app-shell">
<nav class="sb-topnav app-topbar">
    <a class="app-brand" href="{{ url_for('home') }}" title="返回首页">
        <span class="brand-mark"><i class="fas fa-film"></i></span>
        <span>
            <strong>GZ Douban</strong>
            <small>电影数据分析系统</small>
        </span>
    </a>

    <button class="icon-button" id="sidebarToggle" type="button" title="折叠菜单" aria-label="折叠菜单">
        <i class="fas fa-bars"></i>
    </button>

    <div class="topbar-actions">
        <a class="topbar-link" href="{{ url_for('analysis1') }}" title="打开可视化大屏">
            <i class="fas fa-desktop"></i>
            大屏
        </a>
        <a class="app-user" href="{{ url_for('logout') }}" title="退出登录">
            <i class="fas fa-user-circle"></i>
            <span>{{ username|default('用户') }}</span>
            <strong>退出</strong>
        </a>
    </div>
</nav>

<div id="layoutSidenav" class="app-layout">
    <aside id="layoutSidenav_nav" class="app-sidebar">
        <nav class="sb-sidenav accordion" id="sidenavAccordion" aria-label="系统导航">
            <div class="sidebar-head">
                <span class="sidebar-dot"></span>
                <div>
                    <strong>Movie Intelligence</strong>
                    <small>数据采集 · 清洗 · 分析</small>
                </div>
            </div>

            <div class="sb-sidenav-menu">
                <div class="nav">
                    <div class="sb-sidenav-menu-heading">总览</div>
                    <a class="nav-link {% if request.path == '/home' %}active{% endif %}" href="{{ url_for('home') }}">
                        <span class="sb-nav-link-icon"><i class="fas fa-home"></i></span>
                        首页概览
                    </a>
                    <a class="nav-link {% if request.path == '/analysis1' %}active{% endif %}" href="{{ url_for('analysis1') }}">
                        <span class="sb-nav-link-icon"><i class="fas fa-tv"></i></span>
                        可视化大屏
                    </a>
                    <a class="nav-link {% if request.path.startswith('/search') %}active{% endif %}" href="{{ url_for('search', searchId=0) }}">
                        <span class="sb-nav-link-icon"><i class="fas fa-search"></i></span>
                        电影检索
                    </a>

                    <div class="sb-sidenav-menu-heading">分析</div>
                    <a class="nav-link {% if request.path == '/time_t' %}active{% endif %}" href="{{ url_for('time_t') }}">
                        <span class="sb-nav-link-icon"><i class="fas fa-clock"></i></span>
                        时间分析
                    </a>
                    <a class="nav-link {% if request.path.startswith('/rate_t') %}active{% endif %}" href="{{ url_for('rate_t', type='all') }}">
                        <span class="sb-nav-link-icon"><i class="fas fa-star-half-alt"></i></span>
                        评分分析
                    </a>
                    <a class="nav-link {% if request.path == '/address_t' %}active{% endif %}" href="{{ url_for('address_t') }}">
                        <span class="sb-nav-link-icon"><i class="fas fa-map-marker-alt"></i></span>
                        地区语言
                    </a>
                    <a class="nav-link {% if request.path == '/type_t' %}active{% endif %}" href="{{ url_for('type_t') }}">
                        <span class="sb-nav-link-icon"><i class="fas fa-layer-group"></i></span>
                        类型分析
                    </a>
                    <a class="nav-link {% if request.path == '/actor_t' %}active{% endif %}" href="{{ url_for('actor_t') }}">
                        <span class="sb-nav-link-icon"><i class="fas fa-users"></i></span>
                        演员导演
                    </a>

                    <div class="sb-sidenav-menu-heading">数据</div>
                    <a class="nav-link {% if request.path == '/tables/0' %}active{% endif %}" href="{{ url_for('tables', id=0) }}">
                        <span class="sb-nav-link-icon"><i class="fas fa-table"></i></span>
                        数据表
                    </a>

                    <div class="sb-sidenav-menu-heading">词云</div>
                    <a class="nav-link {% if request.path == '/title_c' %}active{% endif %}" href="{{ url_for('title_c') }}">
                        <span class="sb-nav-link-icon"><i class="fas fa-heading"></i></span>
                        标题词云
                    </a>
                    <a class="nav-link {% if request.path == '/casts_c' %}active{% endif %}" href="{{ url_for('casts_c') }}">
                        <span class="sb-nav-link-icon"><i class="fas fa-user-friends"></i></span>
                        演员词云
                    </a>
                    <a class="nav-link {% if request.path == '/comments_c' %}active{% endif %}" href="{{ url_for('comments_c') }}">
                        <span class="sb-nav-link-icon"><i class="fas fa-comments"></i></span>
                        评论词云
                    </a>
                </div>
            </div>
        </nav>
    </aside>

    <div id="layoutSidenav_content" class="app-content">
        <main class="app-main">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
<script src="{{ url_for('static', filename='js/echarts.js') }}"></script>
<script src="{{ url_for('static', filename='js/all.js') }}"></script>
<script src="{{ url_for('static', filename='js/table.js') }}" crossorigin="anonymous"></script>
<script src="{{ url_for('static', filename='js/datatables-simple-demo.js') }}"></script>
{% block scriptcontent %}{% endblock %}
<script src="{{ url_for('static', filename='js/gsap.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/app-motion.js') }}"></script>
</body>
</html>
