<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="referrer" content="no-referrer"/>
    <title>{% block title %}电影数据采集分析系统{% endblock %}</title>
    <link href="/static/css/styles.css" rel="stylesheet"/>
    {% block stylecontent %}{% endblock %}
    <link href="/static/css/app.css" rel="stylesheet"/>
</head>
<body class="sb-nav-fixed">
<nav class="sb-topnav navbar navbar-expand">
    <a class="navbar-brand app-brand ps-3" href="/home">
        <span class="brand-mark"><i class="fas fa-film"></i></span>
        电影数据采集分析系统
    </a>
    <button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0" id="sidebarToggle" type="button">
        <i class="fas fa-bars"></i>
    </button>
    <div class="ms-auto me-3">
        <a class="app-user" href="/logout">
            <i class="fas fa-user-circle me-1"></i>
            {{ username }}
            <span class="ms-2 text-muted">退出</span>
        </a>
    </div>
</nav>

<div id="layoutSidenav">
    <div id="layoutSidenav_nav">
        <nav class="sb-sidenav accordion sb-sidenav-dark" id="sidenavAccordion">
            <div class="sb-sidenav-menu">
                <div class="nav">
                    <div class="sb-sidenav-menu-heading">总览</div>
                    <a class="nav-link {% if request.path == '/home' %}active{% endif %}" href="/home">
                        <div class="sb-nav-link-icon"><i class="fas fa-home"></i></div>
                        首页
                    </a>
                    <a class="nav-link {% if request.path == '/analysis1' %}active{% endif %}" href="/analysis1">
                        <div class="sb-nav-link-icon"><i class="fas fa-tv"></i></div>
                        可视化大屏
                    </a>
                    <a class="nav-link {% if request.path.startswith('/search') %}active{% endif %}" href="/search/0">
                        <div class="sb-nav-link-icon"><i class="fas fa-search"></i></div>
                        电影搜索
                    </a>

                    <div class="sb-sidenav-menu-heading">分析</div>
                    <a class="nav-link {% if request.path == '/time_t' %}active{% endif %}" href="/time_t">
                        <div class="sb-nav-link-icon"><i class="fas fa-clock"></i></div>
                        时间分析
                    </a>
                    <a class="nav-link {% if request.path.startswith('/rate_t') %}active{% endif %}" href="/rate_t/all">
                        <div class="sb-nav-link-icon"><i class="fas fa-star-half-alt"></i></div>
                        评分分析
                    </a>
                    <a class="nav-link {% if request.path == '/address_t' %}active{% endif %}" href="/address_t">
                        <div class="sb-nav-link-icon"><i class="fas fa-map-marker-alt"></i></div>
                        地区语言
                    </a>
                    <a class="nav-link {% if request.path == '/type_t' %}active{% endif %}" href="/type_t">
                        <div class="sb-nav-link-icon"><i class="fas fa-layer-group"></i></div>
                        类型分析
                    </a>
                    <a class="nav-link {% if request.path == '/actor_t' %}active{% endif %}" href="/actor_t">
                        <div class="sb-nav-link-icon"><i class="fas fa-users"></i></div>
                        演员导演
                    </a>

                    <div class="sb-sidenav-menu-heading">数据</div>
                    <a class="nav-link {% if request.path == '/tables/0' %}active{% endif %}" href="/tables/0">
                        <div class="sb-nav-link-icon"><i class="fas fa-table"></i></div>
                        数据表
                    </a>

                    <div class="sb-sidenav-menu-heading">词云</div>
                    <a class="nav-link {% if request.path == '/title_c' %}active{% endif %}" href="/title_c">
                        <div class="sb-nav-link-icon"><i class="fas fa-heading"></i></div>
                        标题词云
                    </a>
                    <a class="nav-link {% if request.path == '/casts_c' %}active{% endif %}" href="/casts_c">
                        <div class="sb-nav-link-icon"><i class="fas fa-user-friends"></i></div>
                        演员词云
                    </a>
                    <a class="nav-link {% if request.path == '/comments_c' %}active{% endif %}" href="/comments_c">
                        <div class="sb-nav-link-icon"><i class="fas fa-comments"></i></div>
                        评论词云
                    </a>
                </div>
            </div>
        </nav>
    </div>

    <div id="layoutSidenav_content">
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<script src="/static/js/scripts.js"></script>
<script src="/static/js/echarts.js"></script>
<script src="/static/js/all.js"></script>
<script src="/static/js/table.js" crossorigin="anonymous"></script>
<script src="/static/js/datatables-simple-demo.js"></script>
{% block scriptcontent %}{% endblock %}
<script src="/static/js/gsap.min.js"></script>
<script src="/static/js/app-motion.js"></script>
</body>
</html>
