{% extends "base.html" %}
{% block title %}演员词云 - 电影数据分析系统{% endblock %}
{% block content %}
<div class="app-page">
    <section class="page-head">
        <div>
            <span class="eyebrow">Word Cloud</span>
            <h1 class="page-title">演员词云</h1>
            <p class="page-subtitle">根据演员字段实时生成词云图，观察数据集中出现频率较高的演员。</p>
        </div>
    </section>
    <section class="panel-card">
        <div class="panel-title">
            <div>
                <span class="eyebrow">Casts</span>
                <h2>演员关键词</h2>
            </div>
            <i class="fas fa-user-friends"></i>
        </div>
        <div class="wordcloud-stage">
            <img src="{{ url_for('static', filename='images/casts.png') }}" alt="演员词云">
        </div>
    </section>
</div>
{% endblock %}
