{% extends "base.html" %}
{% block title %}评论词云{% endblock %}
{% block content %}
<div class="app-page">
    <div class="page-head">
        <div>
            <div class="page-kicker">Word Cloud</div>
            <h1 class="page-title">评论词云</h1>
            <p class="page-subtitle">输入电影名后，根据对应评论内容生成词云图。</p>
        </div>
    </div>

    <div class="toolbar-card">
        <form method="post" action="/comments_c" class="search-form">
            <input name="searchIpt" type="text" class="form-control" placeholder="请输入电影名字">
            <button type="submit" class="btn btn-primary px-4">
                <i class="fas fa-cloud me-1"></i>
                生成词云
            </button>
        </form>
    </div>

    <div class="card">
        <div class="card-header">
            <i class="fas fa-comments"></i>
            评论关键词
        </div>
        <div class="card-body wordcloud-stage">
            <img src="/static/images/comments.png" alt="评论词云">
        </div>
    </div>
</div>
{% endblock %}
