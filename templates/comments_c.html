{% extends "base.html" %}
{% block title %}评论词云 - 电影数据分析系统{% endblock %}
{% block content %}
<div class="app-page">
    <section class="page-head">
        <div>
            <span class="eyebrow">Word Cloud</span>
            <h1 class="page-title">评论词云</h1>
            <p class="page-subtitle">输入电影名后，根据对应评论内容生成词云图。</p>
        </div>
    </section>

    <section class="toolbar-card">
        <form method="post" action="{{ url_for('comments_c') }}" class="search-form">
            <input name="searchIpt" type="text" class="form-control" placeholder="输入电影名">
            <button type="submit" class="btn btn-primary px-4">
                <i class="fas fa-cloud"></i>
                生成词云
            </button>
        </form>
    </section>

    <section class="panel-card">
        <div class="panel-title">
            <div>
                <span class="eyebrow">Comments</span>
                <h2>评论关键词</h2>
            </div>
            <i class="fas fa-comments"></i>
        </div>
        <div class="wordcloud-stage">
            <img src="{{ url_for('static', filename='images/comments.png') }}" alt="评论词云">
        </div>
    </section>
</div>
{% endblock %}
