<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>登录 - 电影数据采集分析系统</title>
    <link href="/static/css/styles.css" rel="stylesheet"/>
    <link href="/static/css/app.css" rel="stylesheet"/>
</head>
<body class="auth-body">
<div class="auth-card">
    <span class="brand-mark"><i class="fas fa-film"></i></span>
    <h1 class="auth-title">电影数据采集分析系统</h1>
    <p class="auth-subtitle">登录后查看电影数据、分析图表和词云结果。</p>

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label" for="inputUsername">用户名</label>
            <input class="form-control" id="inputUsername" name="username" type="text" autocomplete="username">
        </div>
        <div class="mb-3">
            <label class="form-label" for="inputPassword">密码</label>
            <input class="form-control" id="inputPassword" name="password" type="password" autocomplete="current-password">
        </div>
        <div class="auth-actions">
            <a class="text-muted" href="/register">注册账号</a>
            <button class="btn btn-primary px-4" type="submit">登录</button>
        </div>
    </form>
</div>
<script src="/static/js/all.js"></script>
</body>
</html>
