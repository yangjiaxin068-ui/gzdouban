<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>注册 - 电影数据分析系统</title>
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet"/>
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet"/>
</head>
<body class="auth-body">
<main class="auth-shell">
    <section class="auth-visual" aria-hidden="true">
        <div class="auth-visual-panel">
            <span class="brand-mark"><i class="fas fa-user-plus"></i></span>
            <h1>创建账号</h1>
            <p>注册后可以访问电影检索、可视化分析、数据表和词云页面。</p>
            <div class="auth-metric-row">
                <span>电影</span>
                <span>评分</span>
                <span>评论</span>
                <span>词云</span>
            </div>
        </div>
    </section>

    <section class="auth-card">
        <div class="auth-card-head">
            <span class="eyebrow">New account</span>
            <h2>注册账号</h2>
            <p>创建本地账号后进入分析系统。</p>
        </div>

        <form method="post" action="{{ url_for('register') }}" class="auth-form">
            <label class="field-label" for="inputUsername">用户名</label>
            <input class="form-control" name="username" id="inputUsername" type="text" autocomplete="username">

            <label class="field-label" for="inputPassword">密码</label>
            <input class="form-control" id="inputPassword" name="password" type="password" autocomplete="new-password">

            <label class="field-label" for="inputPasswordChecked">确认密码</label>
            <input class="form-control" id="inputPasswordChecked" name="passwordCheked" type="password" autocomplete="new-password">

            <div class="auth-actions">
                <a class="muted-link" href="{{ url_for('login') }}">返回登录</a>
                <button class="btn btn-primary px-4" type="submit">
                    <i class="fas fa-check"></i>
                    注册
                </button>
            </div>
        </form>
    </section>
</main>
<script src="{{ url_for('static', filename='js/all.js') }}"></script>
<script src="{{ url_for('static', filename='js/gsap.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/app-motion.js') }}"></script>
</body>
</html>
