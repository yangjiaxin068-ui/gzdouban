<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>注册 - 电影数据采集分析系统</title>
    <link href="/static/css/styles.css" rel="stylesheet"/>
    <link href="/static/css/app.css" rel="stylesheet"/>
</head>
<body class="auth-body">
<div class="auth-card">
    <span class="brand-mark"><i class="fas fa-user-plus"></i></span>
    <h1 class="auth-title">创建账户</h1>
    <p class="auth-subtitle">创建本地账户后即可进入电影数据分析系统。</p>

    <form method="post" action="/register">
        <div class="mb-3">
            <label class="form-label" for="inputUsername">用户名</label>
            <input class="form-control" name="username" id="inputUsername" type="text" autocomplete="username">
        </div>
        <div class="mb-3">
            <label class="form-label" for="inputPassword">密码</label>
            <input class="form-control" id="inputPassword" name="password" type="password" autocomplete="new-password">
        </div>
        <div class="mb-3">
            <label class="form-label" for="inputPasswordChecked">确认密码</label>
            <input class="form-control" id="inputPasswordChecked" name="passwordCheked" type="password" autocomplete="new-password">
        </div>
        <div class="auth-actions">
            <a class="text-muted" href="/login">返回登录</a>
            <button class="btn btn-primary px-4" type="submit">注册</button>
        </div>
    </form>
</div>
<script src="/static/js/all.js"></script>
</body>
</html>
