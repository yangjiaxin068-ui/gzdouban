{% extends "base.html" %}
{% block title %}时间分析{% endblock %}
{% block content %}
<div class="app-page">
    <div class="page-head">
        <div>
            <div class="page-kicker">Timeline</div>
            <h1 class="page-title">电影时间分析</h1>
            <p class="page-subtitle">按上映年份和片长区间查看电影数据分布。</p>
        </div>
    </div>

    <div class="chart-grid">
        <div class="card chart-card-wide">
            <div class="card-header">
                <i class="fas fa-chart-bar"></i>
                历年产量统计
            </div>
            <div class="card-body">
                <div id="yearChart" class="chart-box"></div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                <i class="fas fa-chart-pie"></i>
                片长区间占比
            </div>
            <div class="card-body">
                <div id="durationPieChart" class="chart-box"></div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                <i class="fas fa-filter"></i>
                片长区间漏斗
            </div>
            <div class="card-body">
                <div id="durationFunnelChart" class="chart-box"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scriptcontent %}
<script>
  const chartPalette = ['#2563eb', '#14b8a6', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'];
  const yearChart = echarts.init(document.getElementById('yearChart'));
  const durationPieChart = echarts.init(document.getElementById('durationPieChart'));
  const durationFunnelChart = echarts.init(document.getElementById('durationFunnelChart'));
  const durationData = {{ movieTimeData | tojson }};

  yearChart.setOption({
    color: ['#2563eb'],
    tooltip: { trigger: 'axis' },
    grid: { left: 54, right: 28, top: 42, bottom: 52 },
    xAxis: {
      type: 'category',
      data: {{ x | tojson }},
      name: '年份',
      axisLabel: { color: '#667085' },
      axisLine: { lineStyle: { color: '#d0d5dd' } }
    },
    yAxis: {
      type: 'value',
      name: '数量',
      axisLabel: { color: '#667085' },
      splitLine: { lineStyle: { color: '#eef2f7' } }
    },
    series: [{
      name: '电影数量',
      type: 'bar',
      data: {{ y | tojson }},
      barWidth: 26,
      itemStyle: { borderRadius: [6, 6, 0, 0] }
    }]
  });

  durationPieChart.setOption({
    color: chartPalette,
    tooltip: { trigger: 'item', formatter: '{b}<br>{c} 部 ({d}%)' },
    legend: { bottom: 0, left: 'center' },
    series: [{
      name: '片长区间',
      type: 'pie',
      radius: ['44%', '68%'],
      center: ['50%', '45%'],
      data: durationData,
      label: { formatter: '{b}: {c}' }
    }]
  });

  durationFunnelChart.setOption({
    color: chartPalette,
    tooltip: { trigger: 'item', formatter: '{b}<br>{c} 部' },
    series: [{
      name: '片长区间',
      type: 'funnel',
      left: '12%',
      top: 38,
      bottom: 36,
      width: '76%',
      sort: 'descending',
      gap: 6,
      data: durationData,
      label: { formatter: '{b}: {c}', color: '#fff', fontWeight: 700 },
      itemStyle: { borderColor: '#fff', borderWidth: 2 }
    }]
  });

  window.addEventListener('resize', function () {
    yearChart.resize();
    durationPieChart.resize();
    durationFunnelChart.resize();
  });
</script>
{% endblock %}
