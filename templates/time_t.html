{% extends "base.html" %}
{% block title %}时间分析 - 电影数据分析系统{% endblock %}
{% block content %}
<div class="app-page">
    <section class="page-head">
        <div>
            <span class="eyebrow">Timeline</span>
            <h1 class="page-title">电影时间分析</h1>
            <p class="page-subtitle">按上映年份和片长区间查看电影数据分布，判断样本集中在哪些年代和时长段。</p>
        </div>
    </section>

    <section class="chart-grid">
        <article class="panel-card chart-card-wide">
            <div class="panel-title">
                <div>
                    <span class="eyebrow">Year</span>
                    <h2>历年电影数量</h2>
                </div>
                <i class="fas fa-chart-bar"></i>
            </div>
            <div id="yearChart" class="chart-box"></div>
        </article>

        <article class="panel-card">
            <div class="panel-title">
                <div>
                    <span class="eyebrow">Runtime</span>
                    <h2>片长区间占比</h2>
                </div>
                <i class="fas fa-chart-pie"></i>
            </div>
            <div id="durationPieChart" class="chart-box"></div>
        </article>

        <article class="panel-card">
            <div class="panel-title">
                <div>
                    <span class="eyebrow">Funnel</span>
                    <h2>片长区间漏斗</h2>
                </div>
                <i class="fas fa-filter"></i>
            </div>
            <div id="durationFunnelChart" class="chart-box"></div>
        </article>
    </section>
</div>
{% endblock %}

{% block scriptcontent %}
<script>
  const chartPalette = ['#2f6fed', '#1aa99a', '#f5a524', '#e25563', '#7c3aed', '#0891b2'];
  const tooltipStyle = { borderWidth: 0, backgroundColor: 'rgba(20, 24, 33, 0.92)', textStyle: { color: '#fff' } };
  const yearChart = echarts.init(document.getElementById('yearChart'));
  const durationPieChart = echarts.init(document.getElementById('durationPieChart'));
  const durationFunnelChart = echarts.init(document.getElementById('durationFunnelChart'));
  const durationData = {{ movieTimeData | tojson }};

  yearChart.setOption({
    color: ['#2f6fed'],
    tooltip: Object.assign({ trigger: 'axis' }, tooltipStyle),
    grid: { left: 56, right: 28, top: 42, bottom: 54 },
    xAxis: {
      type: 'category',
      data: {{ x | tojson }},
      name: '年份',
      axisLabel: { color: '#64748b' },
      axisLine: { lineStyle: { color: '#d8dee9' } }
    },
    yAxis: {
      type: 'value',
      name: '数量',
      axisLabel: { color: '#64748b' },
      splitLine: { lineStyle: { color: '#edf2f7' } }
    },
    series: [{
      name: '电影数量',
      type: 'bar',
      data: {{ y | tojson }},
      barWidth: 24,
      itemStyle: { borderRadius: [6, 6, 0, 0] }
    }]
  });

  durationPieChart.setOption({
    color: chartPalette,
    tooltip: Object.assign({ trigger: 'item', formatter: '{b}<br>{c} 部 ({d}%)' }, tooltipStyle),
    legend: { bottom: 6, left: 'center', textStyle: { color: '#64748b' } },
    series: [{
      name: '片长区间',
      type: 'pie',
      radius: ['46%', '70%'],
      center: ['50%', '45%'],
      data: durationData,
      label: { formatter: '{b}: {c}', color: '#111827' },
      itemStyle: { borderColor: '#fff', borderWidth: 3 }
    }]
  });

  durationFunnelChart.setOption({
    color: chartPalette,
    tooltip: Object.assign({ trigger: 'item', formatter: '{b}<br>{c} 部' }, tooltipStyle),
    series: [{
      name: '片长区间',
      type: 'funnel',
      left: '12%',
      top: 34,
      bottom: 26,
      width: '76%',
      sort: 'descending',
      gap: 8,
      data: durationData,
      label: { formatter: '{b}: {c}', color: '#fff', fontWeight: 700 },
      itemStyle: { borderColor: '#fff', borderWidth: 2 }
    }]
  });

  window.addEventListener('resize', function () {
    yearChart.resize();
    durationPieChart.resize();
    durationFunnelChart.resize();
  });
</script>
{% endblock %}
