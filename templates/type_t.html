{% extends "base.html" %}
{% block title %}类型分析{% endblock %}
{% block content %}
<div class="app-page">
    <div class="page-head">
        <div>
            <div class="page-kicker">Genre</div>
            <h1 class="page-title">电影类型分析</h1>
            <p class="page-subtitle">统计出现次数最高的电影类型，快速查看题材结构。</p>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <i class="fas fa-layer-group"></i>
            类型数量 Top 10
        </div>
        <div class="card-body">
            <div id="typeChart" class="chart-box chart-tall"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scriptcontent %}
<script>
  const typeChart = echarts.init(document.getElementById('typeChart'));
  const typeData = {{ top10Data | tojson }};

  typeChart.setOption({
    color: ['#2563eb', '#14b8a6', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#84cc16', '#f97316', '#64748b', '#0f766e'],
    tooltip: { trigger: 'item', formatter: '{b}<br>{c} 部 ({d}%)' },
    legend: { orient: 'vertical', right: 24, top: 'middle', itemGap: 14 },
    series: [{
      name: '电影类型',
      type: 'pie',
      radius: ['44%', '70%'],
      center: ['40%', '50%'],
      data: typeData,
      label: { formatter: '{b}: {c}', color: '#344054' },
      labelLine: { length: 18, length2: 12 },
      itemStyle: { borderColor: '#fff', borderWidth: 3 }
    }]
  });

  window.addEventListener('resize', function () {
    typeChart.resize();
  });
</script>
{% endblock %}
