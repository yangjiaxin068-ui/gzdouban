{% extends "base.html" %}
{% block title %}类型分析 - 电影数据分析系统{% endblock %}
{% block content %}
<div class="app-page">
    <section class="page-head">
        <div>
            <span class="eyebrow">Genre</span>
            <h1 class="page-title">电影类型分析</h1>
            <p class="page-subtitle">统计出现次数最高的电影类型，快速查看题材结构。</p>
        </div>
    </section>

    <section class="panel-card">
        <div class="panel-title">
            <div>
                <span class="eyebrow">Top 10</span>
                <h2>类型数量排行</h2>
            </div>
            <i class="fas fa-layer-group"></i>
        </div>
        <div id="typeChart" class="chart-box chart-tall"></div>
    </section>
</div>
{% endblock %}

{% block scriptcontent %}
<script>
  const typeChart = echarts.init(document.getElementById('typeChart'));
  const typeData = {{ top10Data | tojson }};

  typeChart.setOption({
    color: ['#2f6fed', '#1aa99a', '#f5a524', '#e25563', '#7c3aed', '#0891b2', '#5d7c2f', '#d97706', '#64748b', '#be185d'],
    tooltip: { trigger: 'item', formatter: '{b}<br>{c} 部 ({d}%)', borderWidth: 0, backgroundColor: 'rgba(20, 24, 33, 0.92)', textStyle: { color: '#fff' } },
    legend: { orient: 'vertical', right: 24, top: 'middle', itemGap: 14, textStyle: { color: '#64748b' } },
    series: [{
      name: '电影类型',
      type: 'pie',
      radius: ['44%', '70%'],
      center: ['40%', '50%'],
      data: typeData,
      label: { formatter: '{b}: {c}', color: '#334155' },
      labelLine: { length: 18, length2: 12 },
      itemStyle: { borderColor: '#fff', borderWidth: 3 }
    }]
  });

  window.addEventListener('resize', function () {
    typeChart.resize();
  });
</script>
{% endblock %}
